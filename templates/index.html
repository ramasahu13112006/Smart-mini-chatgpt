<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mini ChatGPT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #1e1e2e; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .chat-container { width: 100%; max-width: 750px; height: 85vh; display: flex; flex-direction: column; background: #252538; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); overflow: hidden; }
        .chat-header { background: #11111b; padding: 18px; text-align: center; font-size: 1.3rem; font-weight: bold; color: #a6e3a1; border-bottom: 1px solid #313244; }
        
        .messages-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
        .user-msg { background: #89b4fa; color: #11111b; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-msg { background: #45475a; color: #cdd6f4; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        .input-area { padding: 15px; background: #11111b; display: flex; gap: 10px; border-top: 1px solid #313244; }
        input { flex: 1; padding: 14px; background: #313244; border: 1px solid #45475a; border-radius: 6px; color: white; font-size: 1rem; outline: none; }
        input:focus { border-color: #a6e3a1; }
        
        button { background: #a6e3a1; color: #11111b; border: none; padding: 0 24px; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #94e2d5; }
        button:disabled { background: #585b70; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🤖 Smart Mini ChatGPT (Local ML Model)</div>
    <div class="messages-box" id="chatbox">
        <div class="message bot-msg">Hello! You can ask me questions about coding, math, general knowledge, or anything else you like!</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask me anything..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const chatbox = document.getElementById("chatbox");

    // Send message on Enter key press
    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Show user message on screen
        appendMessage(text, 'user-msg');
        userInput.value = "";
        
        // Disable inputs while the model is processing
        userInput.disabled = true;
        sendBtn.disabled = true;

        // "Thinking..." state placeholder
        const botDiv = appendMessage("Thinking...", 'bot-msg');

        try {
            // Sending data to the Backend API (`/chat`)
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            
            // Replace "Thinking..." with the actual answer
            botDiv.innerText = data.reply;
        } catch (error) {
            // Error handling text in English
            botDiv.innerText = "Error: The ML model failed to respond.";
            botDiv.style.color = "#f38ba8";
        }

        // Re-enable inputs
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
    }

    function appendMessage(text, className) {
        const div = document.createElement("div");
        div.className = `message ${className}`;
        div.innerText = text;
        chatbox.appendChild(div);
        chatbox.scrollTop = chatbox.scrollHeight; // Auto-scroll down
        return div;
    }
</script>

</body>
</html>
